<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>SS14</title>
  <link rel="stylesheet" href="https://cdn.rawgit.com/openlayers/openlayers.github.io/master/en/v5.3.0/css/ol.css"
    type="text/css">

  <link rel="icon" type="image/x-icon" href="maplogo.ico">

  <!-- Add to <head> -->
  <meta name="description" content="Browse and explore Space Station 14 maps interactively. View station layouts for SS14 forks including DeltaV and more — zoom, pan, and navigate every grid.">
  <meta name="keywords" content="Space Station 14 maps, SS14 map browser, SS14 map viewer, DeltaV maps, SS14 station layout">
  <link rel="canonical" href="https://map.ss14.space/">

  <!-- Open Graph (Discord, Reddit, social previews) -->
  <meta property="og:title" content="SS14 Map Browser">
  <meta property="og:description" content="Explore Space Station 14 station maps interactively. Browse layouts for SS14 and its forks.">
  <meta property="og:url" content="https://map.ss14.space/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://map.ss14.space/maplogo.png"> <!-- create a screenshot -->

  <!-- Twitter/X card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SS14 Map Browser">
  <meta name="twitter:description" content="Explore Space Station 14 station maps interactively.">
  <meta name="twitter:image" content="https://map.ss14.space/maplogo.png">

  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background-color: #060913;
    }

    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
    }

    .ol-zoom .ol-zoom-in,
    .ol-zoom .ol-zoom-out {
      position: relative;
      background-color: #464b45;
      color: #f2f4f1;
      font-size: 24px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      clip-path: polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
      min-width: 10px;
      text-align: center;
      transition: background-color .2s ease,color .2s ease;
      white-space: nowrap;
      box-sizing: border-box;
      flex-shrink: 0;
      margin-bottom: 10px;
    }

    .ol-zoom .ol-zoom-in:hover,
    .ol-zoom .ol-zoom-out:hover {
      background-color: #5a6159;
    }

    .ol-control:hover {
      background: None;
    }

    .ol-control {
      background: None;
      margin-left: 20px;
      margin-top: 60px;
    }

    #select {
      display: none;
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background-color: #464b45;
      color: #f2f4f1;
      font-size: 18px;
      height: 33px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      clip-path: polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
      min-width: 10px;
      text-align: center;
      transition: background-color .2s ease,color .2s ease;
      white-space: nowrap;
      box-sizing: border-box;
      flex-shrink: 0;
      margin-bottom: 10px;
      margin-left: 20px;
      margin-top: 20px;
    }
  </style>
  <script type="importmap">
    { "imports": { "ol/": "https://cdn.jsdelivr.net/npm/ol@10.3.1/" } }
  </script>
  <script type="module" crossorigin src="/assets/map-CaMFCYYH.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/i18next-Dwgkeukr.js">
</head>

<body>
  <select name="Stations" id="select" style="z-index: 100;">
  </select>
  <div id="map" class="map"></div>



</body>
</html>
