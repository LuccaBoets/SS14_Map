<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>SS14</title>
  <link rel="stylesheet" href="https://cdn.rawgit.com/openlayers/openlayers.github.io/master/en/v5.3.0/css/ol.css"
    type="text/css">
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background-color: #060913;
    }

    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
    }

    .ol-zoom .ol-zoom-in,
    .ol-zoom .ol-zoom-out {
      position: relative;
      background-color: #464b45;
      color: #f2f4f1;
      font-size: 24px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      clip-path: polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
      min-width: 10px;
      text-align: center;
      transition: background-color .2s ease,color .2s ease;
      white-space: nowrap;
      box-sizing: border-box;
      flex-shrink: 0;
      margin-bottom: 10px;
    }

    .ol-zoom .ol-zoom-in:hover,
    .ol-zoom .ol-zoom-out:hover {
      background-color: #5a6159;
    }

    .ol-control:hover {
      background: None;
    }

    .ol-control {
      background: None;
      margin-left: 20px;
      margin-top: 60px;
    }

    #select {
      display: none;
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background-color: #464b45;
      color: #f2f4f1;
      font-size: 18px;
      height: 33px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      clip-path: polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
      min-width: 10px;
      text-align: center;
      transition: background-color .2s ease,color .2s ease;
      white-space: nowrap;
      box-sizing: border-box;
      flex-shrink: 0;
      margin-bottom: 10px;
      margin-left: 20px;
      margin-top: 20px;
    }
  </style>
  <script type="importmap">
    { "imports": { "ol/": "https://cdn.jsdelivr.net/npm/ol@10.3.1/" } }
  </script>
  <script type="module" crossorigin src="/assets/map-CG2l3c_X.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/i18next-DLYN8E2s.js">
</head>

<body>
  <select name="Stations" id="select" style="z-index: 100;">
  </select>
  <div id="map" class="map"></div>



</body>
</html>
