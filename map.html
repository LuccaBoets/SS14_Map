<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Custom Overview Map</title>
  <link rel="stylesheet" href="https://cdn.rawgit.com/openlayers/openlayers.github.io/master/en/v5.3.0/css/ol.css"
    type="text/css">
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background-color: #060913;
    }

    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>

<body>
  <div id="map" class="map"></div>

  <script type="importmap">
  {
    "imports": {
      "ol/": "https://cdn.jsdelivr.net/npm/ol@10.3.1/",
      "ol": "https://cdn.jsdelivr.net/npm/ol@10.3.1/index.js"
    }
  }
  </script>
  <script type="module" src="src/map.js"></script>
</body>
</html>
