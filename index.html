<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SS14 Map Browser</title>

  <style>
    body {
        background-color: #25252A;
    }

    * {
        font-family: Figtree,sans-serif;
        color: #f2f4f1;
    }

    .menu {
        background-color: #303031;
        clip-path: polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
        border: none;
        margin: 10%;
        margin-top: 3%;
        padding: 30px;
    }

    .map-link {
        display: block;
        font-family: Figtree,sans-serif;
        background-color: #464b45;
        color: #f2f4f1;
        font-size: 18px;
        height: 33px;
        font-weight: 600;
        text-decoration: none;
        border: none;
        cursor: pointer;
        clip-path: polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
        text-align: center;
        transition: background-color .2s ease,color .2s ease;
        white-space: nowrap;
        box-sizing: border-box;
        flex-shrink: 0;
        margin-bottom: 10px;
        min-width: 100px;
        max-width: 300px;
        padding-left: 10px;
        padding-right: 10px;
        line-height: 33px;
        margin-left: 10px;
        margin-right: 10px;
    }

    .map-link:hover {
      background-color: #5a6159;
    }

    .grid .subgrid {
        display: flex;
        flex-wrap: wrap;
        flex-direction: row;
    }

  </style>
